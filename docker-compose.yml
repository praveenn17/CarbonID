# ─────────────────────────────────────────────────────────────────────────────
# docker-compose.yml — PostgreSQL for local Docker dev or production-style setup
#
# Use case: when you want to test against a real PostgreSQL database locally.
# For zero-config local dev, use SQLite instead (see backend/.env.example).
#
# Start:   docker compose up -d
# Stop:    docker compose down
# Reset:   docker compose down -v  (destroys the DB volume)
# ─────────────────────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:15-alpine
    container_name: carbonid-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB:       ${POSTGRES_DB:-carbonid}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-carbonid}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: carbonid-api
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-carbonid}?schema=public"
      PORT: 5000
      NODE_ENV: production
      JWT_ACCESS_SECRET:  ${JWT_ACCESS_SECRET:-supersecret_access_key_modify_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-supersecret_refresh_key_modify_in_production}
      FRONTEND_URL: "http://localhost:8080" # Frontend runs via nginx in docker-compose
    ports:
      - "5000:5000"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: carbonid-web
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  pg-data:
    driver: local
